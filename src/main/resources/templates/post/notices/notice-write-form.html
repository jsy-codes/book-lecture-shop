<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공지 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-4" style="max-width: 900px;">
    <h2 class="mb-4">공지 작성</h2>
    <form action="/notices/write" method="post" class="row g-3">
        <div class="col-12">
            <label class="form-label">제목</label>
            <input type="text" class="form-control" name="title" required>
        </div>
        <div class="col-12">
            <label class="form-label">내용</label>
            <textarea class="form-control" name="content" rows="8" required></textarea>
        </div>
        <div class="col-md-6">
            <label class="form-label">노출 시작</label>
            <input type="datetime-local" class="form-control" name="visibleFrom">
        </div>
        <div class="col-md-6">
            <label class="form-label">노출 종료</label>
            <input type="datetime-local" class="form-control" name="visibleTo">
        </div>
        <div class="col-md-6">
            <label class="form-label">중요도</label>
            <input type="number" class="form-control" name="priority" value="0">
        </div>
        <div class="col-md-6 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="pinned" name="pinned">
                <label class="form-check-label" for="pinned">상단 고정</label>
            </div>
        </div>
        <div class="col-12 d-flex gap-2">
            <a href="/notices" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">등록</button>
        </div>
    </form>
</div>
</body>
</html>
