<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공지사항</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>공지사항</h2>
        <a href="/notices/write" class="btn btn-primary">공지 작성</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>#</th>
                <th>제목</th>
                <th>고정</th>
                <th>중요도</th>
                <th>작성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="notice : ${notices}">
                <td th:text="${notice.id}">1</td>
                <td>
                    <a class="text-decoration-none" th:href="@{/notices/{id}(id=${notice.id})}" th:text="${notice.title}">제목</a>
                </td>
                <td>
                    <span th:if="${notice.pinned}" class="badge bg-warning text-dark">고정</span>
                    <span th:unless="${notice.pinned}" class="text-muted">-</span>
                </td>
                <td th:text="${notice.priority}">0</td>
                <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</td>
            </tr>
            <tr th:if="${#lists.isEmpty(notices)}">
                <td colspan="5" class="text-center text-muted">등록된 공지가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
