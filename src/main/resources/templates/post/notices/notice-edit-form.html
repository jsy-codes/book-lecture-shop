<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title th:text="${notice.title}">공지 상세</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-4">
  <div class="card">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <h3 class="card-title mb-0" th:text="${notice.title}">공지 제목</h3>
        <span th:if="${notice.pinned}" class="badge bg-warning text-dark">고정 공지</span>
      </div>
      <p class="text-muted mt-2 mb-1" th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</p>
      <p class="text-muted" th:text="|노출 기간: ${notice.visibleFrom} ~ ${notice.visibleTo}|">기간</p>
      <hr>
      <div class="mb-4" style="white-space: pre-wrap;" th:text="${notice.content}">공지 내용</div>

      <form th:action="@{/notices/{id}/edit(id=${notice.id})}" method="post" class="row g-2">
        <div class="col-md-6">
          <input type="text" class="form-control" name="title" th:value="${notice.title}" placeholder="제목">
        </div>
        <div class="col-md-6">
          <input type="number" class="form-control" name="priority" th:value="${notice.priority}" placeholder="중요도">
        </div>
        <div class="col-12">
          <textarea class="form-control" name="content" rows="4" th:text="${notice.content}"></textarea>
        </div>
        <div class="col-md-6">
          <input type="datetime-local" class="form-control" name="visibleFrom" th:value="${notice.visibleFrom != null ? #temporals.format(notice.visibleFrom, 'yyyy-MM-dd''T''HH:mm') : ''}">
        </div>
        <div class="col-md-6">
          <input type="datetime-local" class="form-control" name="visibleTo" th:value="${notice.visibleTo != null ? #temporals.format(notice.visibleTo, 'yyyy-MM-dd''T''HH:mm') : ''}">
        </div>
        <div class="col-12 form-check ms-2">
          <input class="form-check-input" type="checkbox" id="pinned" name="pinned" th:checked="${notice.pinned}">
          <label class="form-check-label" for="pinned">고정 공지</label>
        </div>
        <div class="col-12 d-flex gap-2">
          <a href="/notices" class="btn btn-secondary">목록</a>
          <button type="submit" class="btn btn-primary">수정 저장</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
