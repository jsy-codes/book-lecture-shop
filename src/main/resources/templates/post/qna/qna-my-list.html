<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 질문 목록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>내 질문 목록</h2>
    <a href="/qna" class="btn btn-outline-secondary">전체 Q&A</a>
  </div>

  <div class="list-group">
    <a th:each="qna : ${qnaPosts}"
       th:href="@{/qna/{id}(id=${qna.id})}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <span th:text="${qna.title}">제목</span>
      <span class="badge text-bg-secondary" th:text="${qna.status}">OPEN</span>
    </a>
    <div th:if="${#lists.isEmpty(qnaPosts)}" class="text-center text-muted p-4 border rounded">
      작성한 질문이 없습니다.
    </div>
  </div>
</div>
</body>
</html>
