<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${qnaPost.title}">Q&A 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-4" style="max-width: 960px;">
    <div class="card mb-3">
        <div class="card-body" >
            <!-- 볼 수 있는 경우 -->
            <div th:if="${isCanView}">

                <h3 class="card-title" th:text="${qnaPost.title}">질문 제목</h3>
                <div class="d-flex gap-2 mb-2">
                    <span class="badge text-bg-secondary" th:text="${qnaPost.status}">OPEN</span>
                    <span class="badge text-bg-dark" th:if="${qnaPost.secret}">비밀글</span>
                </div>
                <p class="card-text" style="white-space: pre-wrap;" th:text="${qnaPost.content}">질문 내용</p>
            </div>
            <!-- 볼 수 없는 경우 -->
            <div th:unless="${isCanView}">
                <h5>🔒 비밀글입니다.</h5>
                <p class="text-muted">작성자와 관리자만 볼 수 있습니다.</p>
            </div>
        </div>
    </div>

    <div class="card mb-3" th:if="${isCanView and qnaPost.answerContent != null}">
        <div class="card-body">
            <h5>답변</h5>
            <p style="white-space: pre-wrap;" th:text="${qnaPost.answerContent}">답변 내용</p>
            <small class="text-muted" th:text="${qnaPost.answeredAt}">답변일</small>
        </div>
    </div>

    <div class="card mb-3" th:if="${isAdmin}">
        <div class="card-body">
            <h5 class="mb-3">답변 작성</h5>
            <form th:action="@{/qna/{id}/answer(id=${qnaPost.id})}" method="post">
                <textarea class="form-control mb-2" name="answerContent" rows="4" placeholder="답변을 입력하세요"></textarea>
                <button class="btn btn-primary" type="submit">답변 등록</button>
            </form>
        </div>
    </div>

    <form th:if="${isAdmin}"
          th:action="@{/qna/{id}/close(id=${qnaPost.id})}"
          method="post"
          class="d-inline">
        <button class="btn btn-outline-danger" type="submit">
            질문 종료
        </button>
    </form>
    <a href="/qna" class="btn btn-secondary">목록</a>
    <form th:if="${isAdmin}"
          th:action="@{/qna/{id}/delete(id=${qnaPost.id})}"
          method="post"
          onsubmit="return confirm('정말 삭제하시겠습니까?');">

        <button type="submit" class="btn btn-danger">
            삭제
        </button>
    </form>
</div>
</body>
</html>
