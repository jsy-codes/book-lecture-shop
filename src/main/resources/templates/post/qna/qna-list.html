<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Q&A 목록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Q&A</h2>
    <div class="d-flex gap-2">
      <a href="/qna/my" class="btn btn-outline-secondary">내 질문</a>
      <a href="/qna/write" class="btn btn-primary">질문 작성</a>
    </div>
  </div>

  <form class="row g-2 mb-3" method="get" action="/qna">
    <div class="col-auto">
      <select name="status" class="form-select">
        <option value="">전체 상태</option>
        <option value="OPEN" th:selected="${selectedStatus != null and selectedStatus.name() == 'OPEN'}">OPEN</option>
        <option value="ANSWERED" th:selected="${selectedStatus != null and selectedStatus.name() == 'ANSWERED'}">ANSWERED</option>
        <option value="CLOSED" th:selected="${selectedStatus != null and selectedStatus.name() == 'CLOSED'}">CLOSED</option>
      </select>
    </div>
    <div class="col-auto"><button class="btn btn-outline-primary" type="submit">필터</button></div>
  </form>

  <div class="list-group">
    <a th:each="qna : ${qnaPosts}"
       th:href="@{/qna/{id}(id=${qna.id})}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <div>
        <strong th:text="${qna.title}">제목</strong>
        <small class="text-muted ms-2" th:text="${qna.secret ? '비밀글' : '공개글'}">공개글</small>
      </div>
      <span class="badge text-bg-secondary" th:text="${qna.status}">OPEN</span>
    </a>
    <div th:if="${#lists.isEmpty(qnaPosts)}" class="text-center text-muted p-4 border rounded">
      등록된 질문이 없습니다.
    </div>
  </div>
</div>
</body>
</html>
