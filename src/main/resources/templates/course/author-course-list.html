<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Courses</title>
</head>
<body>

<h1>My Courses</h1>

<a href="/author/courses/new">+ Create Course</a>

<ul>
  <li th:each="course : ${courses}">
    <b th:text="${course.title}">Title</b>
    <span th:text="${course.status}">DRAFT</span>
    <a th:href="@{/author/courses/{id}(id=${course.id})}">
      Manage
    </a>
  </li>
</ul>

</body>
</html>
