<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Courses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- 접근 불가 등 에러 메시지 있을 때 -->
<script th:if="${errorMessage}" th:inline="javascript">
  alert([[${errorMessage}]]);
</script>
<p th:text="${loginUser.role}"></p>
<div class="container-fluid mt-4">
  <div class="row">

    <!-- 왼쪽 카테고리 -->
    <div class="col-md-3">
      <div class="list-group">
        <a class="list-group-item list-group-item-action active">
          카테고리
        </a>
        <a th:href="@{/courses(category='INFO_PROCESS')}"
           class="list-group-item list-group-item-action">
          정보처리기사
        </a>
        <a th:href="@{/courses(category='SQLD')}"
           class="list-group-item list-group-item-action">
          SQLD
        </a>
        <!-- 추후 카테고리 추가 -->
      </div>
    </div>

    <!-- 오른쪽 코스 목록 -->
    <div class="col-md-9">

      <!-- 상단 버튼 -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>My Courses</h3>
        <a th:if="${loginUser != null and (loginUser.role.name() == 'AUTHOR' or loginUser.role.name() == 'ADMIN')}"
           href="/author/courses/new"
           class="btn btn-primary">
          + Create Course
        </a>
      </div>


      <!-- 코스 목록 -->
      <div class="row row-cols-1 row-cols-md-2 g-4"
           th:if="${courses != null}">

        <div class="col" th:each="course : ${courses}">
          <div class="card h-100">
            <div class="card-body">

              <!-- 코스 제목 -->
              <h5 class="card-title">
                <a th:href="@{/courses/{id}(id=${course.id})}"
                   class="text-decoration-none text-dark"
                   th:text="${course.title}">
                  Course Title
                </a>
              </h5>

              <!-- 상태 -->
              <p class="card-text">
                                <span class="badge bg-secondary"
                                      th:text="${course.status}">
                                    DRAFT
                                </span>
              </p>

              <!-- 관리 버튼 -->
              <a th:if="${loginUser != null and (loginUser.role.name() == 'AUTHOR' or loginUser.role.name() == 'ADMIN') and loginUser.getId() == course.getAuthor().getId()}"
                 th:href="@{/author/courses/{id}(id=${course.id})}"
                 class="btn btn-outline-primary btn-sm">
                Manage
              </a>

            </div>
          </div>
        </div>
      </div>

      <!-- 비어 있을 때 -->
      <div th:if="${courses == null or #lists.isEmpty(courses)}">
        <p>등록된 강의가 없습니다.</p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
