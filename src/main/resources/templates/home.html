<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .banner {
            height: 300px;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }
        .community-preview {
            padding: 2rem;
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<!-- Banner (임시 영역) -->
<div class="container-fluid banner my-3">
    배너 이미지 슬라이드 자리
</div>

<h4>🔥 최신 공지</h4>
<ul class="list-group mb-4">
    <li class="list-group-item"
        th:each="notice : ${notices}">
        <a th:href="@{/notices/{id}(id=${notice.id})}"
           th:text="${notice.title}">
        </a>
    </li>
</ul>

<h4>💬 최신 Q&A</h4>
<ul class="list-group">
    <li class="list-group-item"
        th:each="qna : ${qnas}">
        <a th:href="@{/qna/{id}(id=${qna.id})}"
           th:text="${qna.title}">
        </a>
    </li>
</ul>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
